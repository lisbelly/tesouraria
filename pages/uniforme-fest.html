<!DOCTYPE html>
<html lang="pt-BR">
<head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Uniforme Festividade — Tesouraria UFADS</title> <link rel="stylesheet" href="../css/style.css">
</head>
<body> <script>const CURRENT_PAGE = 'uniforme-fest'; const UNIFORME_TYPE = 'fest';</script>
<script src="../js/core.js"></script>
<script src="../js/_layout.js"></script> <div class="app-wrapper"> <div class="main-content"> <header class="topbar"> <div style="display:flex; align-items:center; gap:12px;"> <button class="sidebar-toggle" onclick="toggleSidebar()"></button> <span class="topbar-title">Uniforme Festividade</span> </div> <div class="topbar-actions"> <button class="btn btn-primary btn-sm" onclick="abrirModalNovo()">+ Nova Irmã</button> </div> </header> <main class="content-area"> <div class="page-title"> Uniforme da Festividade</div> <p class="page-subtitle">Controle de pagamentos por irmã e congregação</p> <!-- Stats --> <div class="stat-grid" style="grid-template-columns:repeat(auto-fill,minmax(150px,1fr));margin-bottom:20px;" id="unif-stats"></div> <!-- Filtros --> <div class="filter-bar"> <select class="form-select" id="filtro-congregacao" onchange="renderUniforme()" style="width:auto;"> <option value="">Todas as congregações</option> </select> <select class="form-select" id="filtro-status" onchange="renderUniforme()" style="width:auto;"> <option value="">Todos os status</option> <option value="integral">Pago integral</option> <option value="parcial">Parcial</option> <option value="nao">Não pago</option> </select> <input type="text" class="form-control" id="filtro-busca" placeholder=" Buscar irmã..." oninput="renderUniforme()" style="max-width:200px;"> </div> <!-- Tabela --> <div class="card"> <div class="table-wrapper" style="border:none;"> <table id="tabela-uniforme"> <thead> <tr> <th>Congregação</th> <th>Irmã</th> <th>Total</th> <th>PIX</th> <th>Dinheiro</th> <th>Pago</th> <th>Pendente</th> <th>Status</th> <th>Ações</th> </tr> </thead> <tbody></tbody> </table> </div> </div> </main> </div>
</div> <!-- MODAL -->
<div class="modal-overlay" id="modal-uniforme" onclick="if(event.target.id==='modal-uniforme') closeModal('modal-uniforme')"> <div class="modal-box"> <div class="modal-head"> <h4 id="modal-unif-title">Nova Irmã</h4> <button class="btn btn-ghost btn-icon" onclick="closeModal('modal-uniforme')"></button> </div> <div class="modal-body"> <input type="hidden" id="edit-id-unif"> <div class="form-row"> <div class="form-group"> <label class="form-label">Congregação <span class="required">*</span></label> <select id="congregacao-unif" class="form-select"></select> </div> <div class="form-group"> <label class="form-label">Telefone <span class="text-muted">(opcional)</span></label> <input type="tel" id="telefone-irma" class="form-control" placeholder="(61) 9..."> </div> </div> <div class="form-group"> <label class="form-label">Nome da Irmã <span class="required">*</span></label> <input type="text" id="nome-irma" class="form-control" placeholder="Nome completo"> </div> <div class="form-group"> <label class="form-label">Valor Total do Uniforme (R$) <span class="required">*</span></label> <input type="number" id="valor-total-unif" class="form-control" step="0.01" oninput="recalcularPagamento()"> </div> <div class="section-title">Pagamento Realizado</div> <div class="form-row"> <div class="form-group"> <label class="form-label"> Valor em PIX (R$)</label> <input type="number" id="pix-pago" class="form-control" step="0.01" value="0" oninput="recalcularPagamento()"> </div> <div class="form-group"> <label class="form-label"> Valor em Dinheiro (R$)</label> <input type="number" id="dinheiro-pago" class="form-control" step="0.01" value="0" oninput="recalcularPagamento()"> </div> </div> <div id="calc-resumo" style="margin-bottom:16px; padding:10px; background:var(--neutral-50); border-radius:var(--radius-sm);"></div> <div class="form-row"> <div class="form-group"> <label class="form-label">Data do Pagamento</label> <input type="date" id="data-unif" class="form-control"> </div> </div> <div class="form-group"> <label class="form-label">Observação</label> <textarea id="obs-unif" class="form-control" placeholder="Opcional..."></textarea> </div> </div> <div class="modal-foot"> <button class="btn btn-outline" onclick="closeModal('modal-uniforme')">Cancelar</button> <button class="btn btn-primary" onclick="salvarUniforme()">Salvar</button> </div> </div>
</div> <script src="../js/uniforme.js"></script>
<script>
requireAuth();
loadData();
populateCongregationSelect('filtro-congregacao', true);
renderStats();
renderUniforme();
</script>
</body>
</html>
